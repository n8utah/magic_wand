; Halloween prop — multiple ESP32 firmware images in one repo.
; Build:  pio run -e wand
;          pio run -e target
; Upload: pio run -e wand -t upload

[platformio]
default_envs = target
; default_envs = wand

[env]
; Pin a recent core for ESP32-D0WD-V3 BLE fixes.
platform = espressif32 @ 6.10.0
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -fno-rtti
    -fno-exceptions
    -fno-threadsafe-statics

[env:wand]
extends = env
build_src_filter =
    +<../firmware/wand/src>
build_flags =
    ${env.build_flags}
    -Ifirmware/wand/include
    -Ifirmware/shared/include
    -DTF_LITE_STATIC_MEMORY
lib_deps =
    h2zero/NimBLE-Arduino @ ^1.4.2
    tanakamasayuki/TensorFlowLite_ESP32 @ ^1.0.0

[env:target]
extends = env
build_src_filter =
    +<../firmware/target/src>
build_flags =
    ${env.build_flags}
    -Ifirmware/target/include
    -Ifirmware/shared/include
lib_deps =
    h2zero/NimBLE-Arduino @ ^1.4.2
    adafruit/Adafruit NeoPixel @ ^1.12.0
