; Magic Wand — ESP32-WROOM-32 + MPU6050 port

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    h2zero/NimBLE-Arduino @ ^1.4.2

build_flags =
    -DCORE_DEBUG_LEVEL=0
; Exclude original Arduino sketch and future ML sources until those phases land.
build_src_filter =
    +<*>
    -<../magic_wand.ino>
